              - paragraph [ref=e615]:
                - strong [ref=e616]: 本基金為投資於標的指數之成分證券或因應標的指數複製策略所需，得投資於符合美國Rule144A規定之債券，該債券屬私募性質，較可能發生流動性不足，財務訊息揭露不完整或因價格不透明導致波動性較大之風險。本基金得投資具總損失吸收能力債券（TLAC Bond），且投資於TLAC Bond上限為本基金淨資產價值百分之三十（30%），是類債券發行機構若出現重大營運或破產危機時，得以契約形式或透過法定機制將債券減記面額或轉換股權，故可能導致部分或全部債權減記、利息取消、債權轉換股權、修改債券條件如到期日、票息、付息日、或暫停配息等變動情形，因此除了流動性風險及變現性風險外，還可能有金融領域集中度風險、本金減計風險、轉換風險及未知風險等相關風險。具總損失吸收能力債券（TLAC Bond）之商品特性及詳細投資風險請詳本基金公開說明書。本基金為投資環境、社會及治理（ESG）相關主題之基金，可能有ESG評鑑標準之差異風險、ESG評鑑標準之主觀判斷風險、對第三方資料來源之依賴風險、對特定ESG投資重點之集中度風險以及ESG基金之其他可能風險，定期評估資訊將於經理公司官網首頁之「企業永續專區」（https://www.capitalfund.com.tw/capital/organization）揭露，投資人應於申購前詳閱基金公開說明書所載之基金所有特色或目標等資訊。
