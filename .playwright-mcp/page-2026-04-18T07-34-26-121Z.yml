        - paragraph [ref=e121]: 因應MSCI將摩台指由新加坡交易所移出並改掛香港交易所；新交所則與富時(FTSE)合作掛牌富時台灣指數期貨(簡稱富台指)並於2020年7月20日上市。富台指期貨同樣以美元計價，與摩台指最大不同為指數一點為40元美金，但因設計最小跳動點為0.25元，故最小跳動金額為10美元(與原摩台期相同)，目前富台指除了保證金略低於摩台指之外、其餘包括交易時間、漲跌幅限制、結算日與結算方式都與原先在新加坡掛牌的摩台指一致。台灣主管機關已於2020年10月20日核准交易。
